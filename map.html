document.getElementById('dayFilter').addEventListener('change', applyFilters);
document.getElementById('regionFilter').addEventListener('change', applyFilters);

function applyFilters() {
    const selectedDay = document.getElementById('dayFilter').value;
    const selectedRegion = document.getElementById('regionFilter').value;

    markersList.forEach((marker, index) => {
        const customer = customerData[index];
        const matchesDay = selectedDay === 'all' || customer.hari === selectedDay;
        const matchesRegion = selectedRegion === 'all' || customer.wilayah === selectedRegion;

        if (matchesDay && matchesRegion) {
            markers.addLayer(marker);
        } else {
            markers.removeLayer(marker);
        }
    });

        function groupCustomersByCriteria() {
    const groups = {};

    customerData.forEach(customer => {
        // Gabungkan hari dan wilayah sebagai kunci grup
        const key = `${customer.hari} - ${customer.wilayah}`;

        if (!groups[key]) {
            groups[key] = [];
        }

        groups[key].push(customer);
    });

    return groups;
}

    const areaList = document.getElementById('areaList');

    Object.keys(groups).sort().forEach(group => {

        groupHeader.className = 'area-header';
        groupHeader.innerHTML = `${group} <span>(${groupData.length})</span>`;

        const groupContent = document.createElement('div');
        groupContent.className = 'area-content';

        groupData.sort((a, b) => a.desc.localeCompare(b.desc)).forEach(customer => {
            const customerItem = document.createElement('div');
            customerItem.className = 'customer-item';
            customerItem.textContent = customer.desc.match(/<b>(.*?)<\/b>/)[1]; // Ambil nama pelanggan
            customerItem.onclick = () => {
                map.setView([customer.lat, customer.lng], 16);
                markersList.forEach(marker => {
                    if (
                        marker.getLatLng().lat === customer.lat &&
                        marker.getLatLng().lng === customer.lng
                    ) {
                        marker.openPopup();
                    }
                });
            };
            groupContent.appendChild(customerItem);
        });

        groupHeader.onclick = () => {
            const isActive = groupContent.classList.contains('active');

                content.classList.remove('active');
            });
            if (!isActive) {
                groupContent.classList.add('active');
            }
        };

        areaList.appendChild(groupHeader);
        areaList.appendChild(groupContent);
    });

        // Dark Mode functionality
function toggleTheme() {
    const body = document.body;
    const themeIcon = document.getElementById('theme-icon');
    
    if (body.classList.contains('dark-mode')) {
        // Switch to Light Mode
        body.classList.remove('dark-mode');
        themeIcon.textContent = ' 🌙';
        localStorage.setItem('theme', 'light');
        
        // Switch map tiles
        map.eachLayer((layer) => {
            if (layer instanceof L.TileLayer) {
                map.removeLayer(layer);
            }
        });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
    } else {
        // Switch to Dark Mode
        body.classList.add('dark-mode');
        themeIcon.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
        
        // Switch map tiles
        map.eachLayer((layer) => {
            if (layer instanceof L.TileLayer) {
                map.removeLayer(layer);
            }
        });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors, © CARTO'
        }).addTo(map);
    }
}

function groupCustomersByAreaAndDay() {
    const areas = {};

    customerData.forEach(customer => {
        const area = customer.wilayah || "Wilayah Tidak Diketahui";
        const day = customer.hari || "Hari Tidak Diketahui";

        if (!areas[area]) {
            areas[area] = {};
        }
        if (!areas[area][day]) {
            areas[area][day] = [];
        }

        areas[area][day].push({
            name: customer.desc.match(/<b>(.*?)<\/b>/)[1],
            lat: customer.lat,
            lng: customer.lng,
            desc: customer.desc
        });
    });

    const sortedAreas = Object.keys(areas)
        .sort((a, b) => a.localeCompare(b))
        .map(area => ({
            area,
            days: Object.keys(areas[area])
                .sort((a, b) => a.localeCompare(b))
                .map(day => ({
                    day,
                    customers: areas[area][day]
                }))
        }));

    return sortedAreas;
    }

        // Setup autocomplete
        function setupAutocomplete() {
        const searchInput = document.getElementById('searchInput');
        const autocompleteList = document.getElementById('autocompleteList');
        const showAllBtn = document.getElementById('showAllBtn');
        
        function showAllCustomers() {
            autocompleteList.innerHTML = '';
            autocompleteList.style.display = 'block';
            
            customerData.forEach(customer => {
                const name = customer.desc.match(/<b>(.*?)<\/b>/)[1];
                const div = document.createElement('div');
                div.textContent = name;
                div.addEventListener('click', () => {
                    searchInput.value = name;
                    autocompleteList.style.display = 'none';
                    map.setView([customer.lat, customer.lng], 16);
                    markersList.forEach(marker => {
                        if (marker.getLatLng().lat === customer.lat && 
                            marker.getLatLng().lng === customer.lng) {
                            marker.openPopup();
                        }
                    });
                });
                autocompleteList.appendChild(div);
            });
        }

        showAllBtn.addEventListener('click', showAllCustomers);
        
        searchInput.addEventListener('input', function(e) {
            const value = this.value.toLowerCase();
            autocompleteList.innerHTML = '';
            
            if (!value) {
                showAllCustomers(); // Tampilkan semua ketika input kosong
                return;
            }

            const matches = customerData.filter(customer => 
                customer.desc.toLowerCase().includes(value)
            );

            if (matches.length > 0) {
                autocompleteList.style.display = 'block';
                matches.forEach(customer => {
                    const name = customer.desc.match(/<b>(.*?)<\/b>/)[1];
                    const div = document.createElement('div');
                    div.textContent = name;
                    div.addEventListener('click', () => {
                        searchInput.value = name;
                        autocompleteList.style.display = 'none';
                        map.setView([customer.lat, customer.lng], 16);
                        markersList.forEach(marker => {
                            if (marker.getLatLng().lat === customer.lat && 
                                marker.getLatLng().lng === customer.lng) {
                                marker.openPopup();
                            }
                        });
                    });
                    autocompleteList.appendChild(div);
                });
            } else {
                autocompleteList.style.display = 'none';
            }
        });

        // Tutup autocomplete saat klik di luar
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !showAllBtn.contains(e.target)) {
                autocompleteList.style.display = 'none';
            }
        });
    }

        // Event listener untuk filter status
        document.getElementById('statusFilter').addEventListener('change', function(e) {
            const status = e.target.value;
            
            markersList.forEach((marker, index) => {
                const customer = customerData[index];
                if (status === 'all' || 
                    (status === 'active' && !customer.desc.includes('Tidak Aktif')) ||
                    (status === 'inactive' && customer.desc.includes('Tidak Aktif'))) {
                    markers.addLayer(marker);
                } else {
                    markers.removeLayer(marker);
                }
            });
        });


        
        // Event handler untuk zoom
        map.on('zoom', function() {
            const zoomLevel = map.getZoom();
            let newSize = zoomLevel >= 13 ? 18 : zoomLevel >= 10 ? 15 : 10;

            markersList.forEach((marker, index) => {
                const isActive = !customerData[index].desc.includes('Tidak Aktif');
                const color = isActive ? '#2ecc71' : '#e74c3c';
                marker.setIcon(createCircleIcon(newSize, color));
            });
        });

        // Inisialisasi
        renderCustomerMenu();
        setupAutocomplete();
        map.fire('zoom');
    </script>
